name: release-rom

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Single Git ref (commit SHA, tag, or branch) to build
        required: false
        type: string
      range:
        description: Optional git revision range to backfill (for example abc123..def456)
        required: false
        type: string

permissions:
  contents: write

jobs:
  collect-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.collect.outputs.commits }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commits to build
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          input_ref="${{ inputs.ref || '' }}"
          input_range="${{ inputs.range || '' }}"

          commits=()

          if [[ -n "$input_range" ]]; then
            while IFS= read -r sha; do
              commits+=("$sha")
            done < <(git rev-list --reverse "$input_range")
          elif [[ -n "$input_ref" ]]; then
            commits+=("$(git rev-parse "${input_ref}^{commit}")")
          elif [[ "$event_name" == "push" ]]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ "$before" =~ ^0+$ ]]; then
              commits+=("$(git rev-parse "${after}^{commit}")")
            else
              while IFS= read -r sha; do
                commits+=("$sha")
              done < <(git rev-list --reverse "${before}..${after}")
            fi
          else
            commits+=("$(git rev-parse HEAD)")
          fi

          if ((${#commits[@]} == 0)); then
            echo "ERROR: no commits resolved for this workflow run." >&2
            exit 1
          fi

          json=$(printf '%s\n' "${commits[@]}" | jq -R . | jq -cs .)
          echo "commits=$json" >> "$GITHUB_OUTPUT"

  build-and-release:
    runs-on: ubuntu-latest
    needs: collect-commits
    strategy:
      fail-fast: false
      matrix:
        commit: ${{ fromJson(needs.collect-commits.outputs.commits) }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.commit }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.9.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ROM
        run: npm run build

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          commit_sha="$(git rev-parse HEAD)"
          short_sha="${commit_sha:0:12}"
          subject="$(git log -1 --format=%s)"
          body="$(git log -1 --format=%b)"
          tag="rom-${short_sha}"
          title="🎮 ${short_sha} · ${subject}"

          rom_assets=(build/*.gb)
          sym_assets=(build/*.sym)

          {
            echo "commit_sha=$commit_sha"
            echo "short_sha=$short_sha"
            echo "tag=$tag"
            echo "title=$title"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## ✨ Commit"
            echo
            echo "**${subject}**"
            echo
            if [[ -n "$body" ]]; then
              printf '%s\n' "$body"
              echo
            fi
            echo "## 📦 Downloads"
            echo
            for asset in "${rom_assets[@]}"; do
              echo "- \`$(basename "$asset")\` — playable Game Boy ROM"
            done
            for asset in "${sym_assets[@]}"; do
              echo "- \`$(basename "$asset")\` — symbol file for debuggers/emulators"
            done
            echo
            echo "## 🔎 Build info"
            echo
            echo "- Commit: [\`${short_sha}\`](https://github.com/${{ github.repository }}/commit/${commit_sha})"
            echo "- Release tag: \`${tag}\`"
            echo "- Triggered by: \`${{ github.event_name }}\`"
          } > release-notes.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kananeko-${{ steps.meta.outputs.short_sha }}
          path: |
            build/*.gb
            build/*.sym
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
        shell: bash
        run: |
          set -euo pipefail

          assets=(build/*.gb build/*.sym)

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" \
              "${assets[@]}" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
          fi
