name: release-rom

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Single Git ref (commit SHA, tag, or branch) to build
        required: false
        type: string
      range:
        description: Optional git revision range to backfill (for example abc123..def456)
        required: false
        type: string

permissions:
  contents: write

jobs:
  collect-commits:
    runs-on: ubuntu-latest
    outputs:
      commits: ${{ steps.collect.outputs.commits }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve commits to build
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          event_name="${{ github.event_name }}"
          input_ref="${{ inputs.ref || '' }}"
          input_range="${{ inputs.range || '' }}"

          commits=()

          if [[ -n "$input_range" ]]; then
            while IFS= read -r sha; do
              commits+=("$sha")
            done < <(git rev-list --reverse "$input_range")
          elif [[ -n "$input_ref" ]]; then
            commits+=("$(git rev-parse "${input_ref}^{commit}")")
          elif [[ "$event_name" == "push" ]]; then
            before="${{ github.event.before }}"
            after="${{ github.sha }}"
            if [[ "$before" =~ ^0+$ ]]; then
              commits+=("$(git rev-parse "${after}^{commit}")")
            else
              while IFS= read -r sha; do
                commits+=("$sha")
              done < <(git rev-list --reverse "${before}..${after}")
            fi
          else
            commits+=("$(git rev-parse HEAD)")
          fi

          if ((${#commits[@]} == 0)); then
            echo "ERROR: no commits resolved for this workflow run." >&2
            exit 1
          fi

          json=$(printf '%s\n' "${commits[@]}" | jq -R . | jq -cs .)
          echo "commits=$json" >> "$GITHUB_OUTPUT"

  build-and-release:
    runs-on: ubuntu-latest
    needs: collect-commits
    strategy:
      fail-fast: false
      matrix:
        commit: ${{ fromJson(needs.collect-commits.outputs.commits) }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.commit }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ROM
        run: npm run build

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse HEAD)"
          short_sha="${commit_sha:0:12}"
          tag="rom-${short_sha}"
          title="ROM build ${short_sha}"

          {
            echo "commit_sha=$commit_sha"
            echo "short_sha=$short_sha"
            echo "tag=$tag"
            echo "title=$title"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<EOF
          Automated ROM build for commit [\`${short_sha}\`](https://github.com/${{ github.repository }}/commit/${commit_sha}).

          Assets:
          - \`kananeko.gb\` — playable Game Boy ROM
          - \`kananeko.sym\` — symbol file for debuggers/emulators

          Triggered by: \`${{ github.event_name }}\`
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kananeko-${{ steps.meta.outputs.short_sha }}
          path: |
            build/kananeko.gb
            build/kananeko.sym
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.title }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$RELEASE_TAG" \
              build/kananeko.gb \
              build/kananeko.sym \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              build/kananeko.gb \
              build/kananeko.sym \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              --prerelease
          fi
